# pnpm is the canonical package manager for this project (see CLAUDE.md).
#
# Stale-deps behavior for `pnpm run`/`pnpm exec` (incl. the husky pre-commit
# hook `pnpm exec lint-staged`). The pnpm default is `install`, which auto-
# recreates node_modules before running and can wipe it if interrupted (that
# recreate is what surfaces as "packages field is missing" on commit). `warn`
# just prints a heads-up on a stale tree instead. NOTE: pnpm 10/11 reads this
# from pnpm-workspace.yaml, NOT .npmrc (.npmrc only supplies auth/registry).
verifyDepsBeforeRun: warn

# Dependency build-script allowlist. pnpm blocks postinstall/build scripts by
# default; only packages set to `true` here may run them. In pnpm 11 this
# `allowBuilds` map REPLACES the old `onlyBuiltDependencies` list — `pnpm
# approve-builds` writes here, and any unreviewed build script makes install
# re-inject a `set this to true or false` placeholder (and, under the default
# strictDepBuilds, fail). All entries below are trusted build tooling we rely on:
#   - @tailwindcss/oxide — Tailwind v4 native engine
#   - @sentry/cli        — uploads source maps at build time
#   - esbuild            — bundler native binary
#   - sharp + the imagemin binaries (cwebp/gifsicle/jpegtran/mozjpeg/optipng/
#     pngquant) — power the image pipeline (scripts/optimize-images.mjs and
#     vite-plugin-imagemin in vite.config.js).
allowBuilds:
  '@sentry/cli': true
  '@tailwindcss/oxide': true
  cwebp-bin: true
  esbuild: true
  gifsicle: true
  jpegtran-bin: true
  mozjpeg: true
  optipng-bin: true
  pngquant-bin: true
  sharp: true
