<!doctype html>
<html lang="en" data-theme="missy">
	<head>
		<meta charset="utf-8" />
		<meta
			name="description"
			content="Missy Midwest — open-format DJ, producer & vocalist. Music, shows, merch & booking."
		/>
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://files.stripe.com" />
		<!-- Instagram tiles load below the fold from Instagram's CDN; resolve DNS
		     early without spending a full connection up front. -->
		<link rel="dns-prefetch" href="https://scontent.cdninstagram.com" />
		<link
			rel="preload"
			as="image"
			type="image/avif"
			href="%sveltekit.assets%/landing/missy-fan-crop.avif"
			fetchpriority="high"
		/>
		<!-- Render-critical self-hosted fonts: Cochin (hero heading / LCP text)
		     and Obviously (body). crossorigin is required even same-origin so the
		     preload matches the CORS font fetch and the file isn't fetched twice. -->
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			href="/fonts/Cochin.woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			href="/fonts/obviously.woff2"
			crossorigin="anonymous"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="svelte">%sveltekit.body%</div>
	</body>
</html>
